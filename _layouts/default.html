<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    body { font-family: Georgia, serif; max-width: 860px; margin: 0 auto; padding: 20px 30px; color: #333; }
    nav { border-bottom: 1px solid #ddd; margin-bottom: 2em; padding-bottom: 0.5em; }
    nav a { margin-right: 1.5em; text-decoration: none; color: #555; font-family: sans-serif; font-size: 0.95em; }
    nav a:hover, nav a.active { color: #000; border-bottom: 2px solid #333; }
    header h1 { font-size: 1.6em; margin-bottom: 0; }
    header p { color: #666; font-size: 0.95em; margin-top: 0.3em; }
    h1, h2, h3 { font-family: sans-serif; }
    footer { margin-top: 3em; padding-top: 1em; border-top: 1px solid #ddd; font-size: 0.85em; color: #888; font-family: sans-serif; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}" style="text-decoration:none; color:inherit;">{{ site.title }}</a></h1>
    <p>{{ site.description }}</p>
  </header>
  <nav>
    {% for item in site.navigation %}
      <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active"{% endif %}>{{ item.title }}</a>
    {% endfor %}
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    &copy; {{ site.time | date: "%Y" }} {{ site.author }}
  </footer>
</body>
</html>
